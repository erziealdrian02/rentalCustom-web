<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Returns - Tool Rental Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/dummy-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
</head>
<body class="bg-gray-100">
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = 'Tool Returns';

      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      let html = `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-semibold text-gray-900">Tool Returns</h2>
          <a href="return-form.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            New Return
          </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Total Returns</p>
            <p class="text-3xl font-bold text-gray-900 mt-2">${dummyData.returns.length}</p>
          </div>

          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Completed</p>
            <p class="text-3xl font-bold text-green-600 mt-2">${dummyData.returns.filter(r => r.status === 'Completed').length}</p>
          </div>

          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Pending</p>
            <p class="text-3xl font-bold text-yellow-600 mt-2">${dummyData.returns.filter(r => r.status === 'Pending').length}</p>
          </div>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
          <div id="returns-table"></div>
        </div>
      `;

      pageContent.innerHTML = html;

      function renderReturnsTable() {
        const tableContainer = document.getElementById('returns-table');
        let html = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b border-gray-200"><tr>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Return ID</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Invoice</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Tool</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Customer</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Return Date</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Condition</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Status</th>';
        html += '</tr></thead><tbody>';

        dummyData.returns.forEach(ret => {
          const conditionColor = App.getStatusBadgeColor(ret.condition);
          const statusColor = App.getStatusBadgeColor(ret.status);

          html += `
            <tr class="border-b hover:bg-gray-50 transition">
              <td class="px-6 py-4 font-semibold">${ret.returnId}</td>
              <td class="px-6 py-4">${ret.invoiceNumber}</td>
              <td class="px-6 py-4">${ret.toolName}</td>
              <td class="px-6 py-4">${ret.customerName}</td>
              <td class="px-6 py-4">${App.formatDate(ret.returnDate)}</td>
              <td class="px-6 py-4"><span class="px-2 py-1 text-xs font-semibold rounded ${conditionColor}">${ret.condition}</span></td>
              <td class="px-6 py-4"><span class="px-2 py-1 text-xs font-semibold rounded ${statusColor}">${ret.status}</span></td>
            </tr>
          `;
        });

        html += '</tbody></table></div>';
        tableContainer.innerHTML = html;
      }

      renderReturnsTable();
    });
  </script>
</body>
</html>
