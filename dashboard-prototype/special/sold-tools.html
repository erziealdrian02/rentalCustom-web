<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sold Tools - Tool Rental Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/dummy-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
</head>
<body class="bg-gray-100">
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = 'Sold Tools';

      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      let html = `
        <div class="mb-6">
          <h2 class="text-xl font-semibold text-gray-900">Sold Tools Inventory</h2>
          <p class="text-sm text-gray-600 mt-2">Tools that have been sold off from inventory</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Total Sold</p>
            <p class="text-3xl font-bold text-gray-900 mt-2">${dummyData.soldTools.length}</p>
          </div>

          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Total Revenue from Sales</p>
            <p class="text-3xl font-bold text-blue-600 mt-2">${App.formatCurrency(dummyData.soldTools.reduce((sum, t) => sum + t.soldPrice, 0))}</p>
          </div>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
          <div id="sold-tools-table"></div>
        </div>
      `;

      pageContent.innerHTML = html;

      function renderSoldToolsTable() {
        const tableContainer = document.getElementById('sold-tools-table');
        
        if (dummyData.soldTools.length === 0) {
          tableContainer.innerHTML = '<div class="p-8 text-center"><p class="text-gray-600">No sold tools</p></div>';
          return;
        }

        let html = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b border-gray-200"><tr>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Tool Code</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Tool Name</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Serial Number</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Original Value</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Sold Price</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Sold Date</th>';
        html += '</tr></thead><tbody>';

        dummyData.soldTools.forEach(tool => {
          const profit = tool.soldPrice - tool.replacementValue;
          const profitPercent = ((profit / tool.replacementValue) * 100).toFixed(0);

          html += `
            <tr class="border-b hover:bg-gray-50 transition">
              <td class="px-6 py-4 font-semibold">${tool.toolCode}</td>
              <td class="px-6 py-4">${tool.toolName}</td>
              <td class="px-6 py-4 text-gray-600">${tool.serialNumber}</td>
              <td class="px-6 py-4">${App.formatCurrency(tool.replacementValue)}</td>
              <td class="px-6 py-4">
                <div>
                  <p class="font-semibold">${App.formatCurrency(tool.soldPrice)}</p>
                  <p class="text-xs ${profit >= 0 ? 'text-green-600' : 'text-red-600'}">${profit >= 0 ? '+' : ''}${profit.toFixed(2)} (${profitPercent}%)</p>
                </div>
              </td>
              <td class="px-6 py-4">${App.formatDate(tool.soldDate)}</td>
            </tr>
          `;
        });

        html += '</tbody></table></div>';
        tableContainer.innerHTML = html;
      }

      renderSoldToolsTable();
    });
  </script>
</body>
</html>
