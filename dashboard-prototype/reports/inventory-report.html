<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Report - Tool Rental Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <script src="../js/dummy-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/charts.js"></script>
  <script src="../js/layout.js"></script>
</head>
<body class="bg-gray-100">
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = 'Inventory Report';

      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      const totalToolValue = dummyData.tools.reduce((sum, t) => sum + t.replacementValue, 0);
      const lowStockCount = dummyData.stockOverview.filter(s => s.quantity < 3).length;

      let html = `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-semibold text-gray-900">Inventory Report</h2>
          <div class="flex gap-2">
            <input type="date" id="start-date" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="date" id="end-date" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="exportReport()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
              </svg>
              Export
            </button>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Total Tools</p>
            <p class="text-3xl font-bold text-gray-900 mt-2">${dummyData.tools.length}</p>
          </div>

          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Total Value</p>
            <p class="text-3xl font-bold text-green-600 mt-2">${App.formatCurrency(totalToolValue)}</p>
          </div>

          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Low Stock Items</p>
            <p class="text-3xl font-bold text-red-600 mt-2">${lowStockCount}</p>
          </div>

          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Warehouses</p>
            <p class="text-3xl font-bold text-blue-600 mt-2">${dummyData.warehouses.length}</p>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Tool Status Distribution</h3>
            <canvas id="toolStatusChart" height="300"></canvas>
          </div>

          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Tools by Category</h3>
            <canvas id="toolCategoryChart" height="300"></canvas>
          </div>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden p-6 mb-8">
          <h3 class="text-lg font-semibold text-gray-900 mb-4">Tool Inventory Details</h3>
          <div id="inventory-table"></div>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden p-6">
          <h3 class="text-lg font-semibold text-gray-900 mb-4">Warehouse Utilization</h3>
          <div id="warehouse-table"></div>
        </div>
      `;

      pageContent.innerHTML = html;

      const today = new Date();
      const monthAgo = new Date(today.getFullYear(), today.getMonth() - 1, today.getDate());
      document.getElementById('start-date').value = monthAgo.toISOString().split('T')[0];
      document.getElementById('end-date').value = today.toISOString().split('T')[0];

      function renderReportData() {
        // Tool Status Chart
        const statusData = ChartManager.createPieChartData(
          dummyData.toolStatusDistribution.map(d => d.label),
          dummyData.toolStatusDistribution.map(d => d.value),
          dummyData.toolStatusDistribution.map(d => d.color)
        );
        ChartManager.initChart('toolStatusChart', 'doughnut', statusData, ChartManager.pieChartOptions());

        // Tools by Category
        const categoryCounts = {};
        dummyData.tools.forEach(tool => {
          categoryCounts[tool.category] = (categoryCounts[tool.category] || 0) + 1;
        });

        const categoryData = ChartManager.createBarChartData(
          Object.keys(categoryCounts),
          Object.values(categoryCounts),
          'Number of Tools'
        );
        ChartManager.initChart('toolCategoryChart', 'bar', categoryData, ChartManager.barChartOptions());

        // Inventory Details
        const inventoryTable = document.getElementById('inventory-table');
        let html = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b border-gray-200"><tr>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Tool Code</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Tool Name</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Category</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Status</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Value</th>';
        html += '</tr></thead><tbody>';

        dummyData.tools.forEach(tool => {
          const statusColor = App.getStatusBadgeColor(tool.status);
          html += `
            <tr class="border-b hover:bg-gray-50 transition">
              <td class="px-6 py-4 font-semibold">${tool.code}</td>
              <td class="px-6 py-4">${tool.name}</td>
              <td class="px-6 py-4">${tool.category}</td>
              <td class="px-6 py-4"><span class="px-2 py-1 text-xs font-semibold rounded ${statusColor}">${tool.status}</span></td>
              <td class="px-6 py-4">${App.formatCurrency(tool.replacementValue)}</td>
            </tr>
          `;
        });

        html += '</tbody></table></div>';
        inventoryTable.innerHTML = html;

        // Warehouse Utilization
        const warehouseTable = document.getElementById('warehouse-table');
        let warehouseHtml = '<div class="space-y-4">';

        dummyData.warehouses.forEach(warehouse => {
          const utilization = Math.round((warehouse.currentStock / warehouse.capacity) * 100);
          const utilizationColor = utilization > 80 ? 'bg-red-200' : utilization > 50 ? 'bg-yellow-200' : 'bg-green-200';

          warehouseHtml += `
            <div class="border border-gray-200 rounded-lg p-4">
              <div class="flex justify-between items-center mb-2">
                <h4 class="font-semibold text-gray-900">${warehouse.name}</h4>
                <span class="text-sm text-gray-600">${warehouse.currentStock} / ${warehouse.capacity} items</span>
              </div>
              <div class="w-full bg-gray-200 rounded-full h-3">
                <div class="${utilizationColor} h-3 rounded-full transition" style="width: ${utilization}%"></div>
              </div>
              <p class="text-xs text-gray-600 mt-2">${warehouse.location} - Utilization: ${utilization}%</p>
            </div>
          `;
        });

        warehouseHtml += '</div>';
        warehouseTable.innerHTML = warehouseHtml;
      }

      window.exportReport = function() {
        alert('Export functionality would generate a PDF/CSV file with the current inventory data.');
      };

      setTimeout(renderReportData, 100);
    });
  </script>
</body>
</html>
