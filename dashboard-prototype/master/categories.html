<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Categories - Tool Rental Management</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="../js/dummy-data.js"></script>
        <script src="../js/app.js"></script>
        <script src="../js/forms.js"></script>
        <script src="../js/layout.js"></script>
    </head>
    <body class="bg-gray-100">
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const pageTitle = document.getElementById("page-title");
                if (pageTitle) pageTitle.textContent = "Tool Categories";

                const pageContent = document.getElementById("page-content");
                if (!pageContent) return;

                let categories = [...dummyData.categories];

                let html = `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-semibold text-gray-900">Tool Categories</h2>
          <button onclick="FormManager.openModal('add-category-modal')" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Add Category
          </button>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
          <div id="categories-table"></div>
        </div>

        <div id="add-category-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
          <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-4">
              <h3 class="text-xl font-semibold text-gray-900">Add Category</h3>
              <button onclick="FormManager.closeModal('add-category-modal')" data-close-modal class="text-gray-500 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            </div>

            <form id="category-form" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Category Name</label>
                <input type="text" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                <textarea name="description" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
              </div>

              <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
                Save Category
              </button>
            </form>
          </div>
        </div>
      `;

                pageContent.innerHTML = html;

                FormManager.setupModalClose("add-category-modal");
                FormManager.setupFormSubmit("category-form", (data) => {
                    const newCategory = {
                        id:
                            Math.max(...dummyData.categories.map((c) => c.id)) +
                            1,
                        name: data.name,
                        description: data.description,
                    };

                    dummyData.categories.push(newCategory);
                    categories = [...dummyData.categories];
                    renderCategoriesTable();
                    FormManager.closeModal("add-category-modal");
                    FormManager.clearForm("category-form");
                    window.app.showNotification(
                        "Category added successfully!",
                        "success",
                    );
                });

                function renderCategoriesTable() {
                    const tableContainer =
                        document.getElementById("categories-table");
                    let html =
                        '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b border-gray-200"><tr>';
                    html +=
                        '<th class="px-6 py-3 text-left font-semibold text-gray-700">Name</th>';
                    html +=
                        '<th class="px-6 py-3 text-left font-semibold text-gray-700">Description</th>';
                    html +=
                        '<th class="px-6 py-3 text-left font-semibold text-gray-700">Actions</th>';
                    html += "</tr></thead><tbody>";

                    categories.forEach((cat, idx) => {
                        html += `
            <tr class="border-b hover:bg-gray-50 transition">
              <td class="px-6 py-4 font-semibold">${cat.name}</td>
              <td class="px-6 py-4 text-gray-600">${cat.description}</td>
              <td class="px-6 py-4">
                <div class="flex gap-2">
                  <button onclick="editCategory(${idx})" class="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 text-xs">Edit</button>
                  <button onclick="deleteCategory(${idx})" class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 text-xs">Delete</button>
                </div>
              </td>
            </tr>
          `;
                    });

                    html += "</tbody></table></div>";
                    tableContainer.innerHTML = html;
                }

                window.editCategory = function (idx) {
                    const cat = categories[idx];
                    FormManager.openModal("add-category-modal");
                    document.querySelector(
                        "#add-category-modal h3",
                    ).textContent = "Edit Category";
                    FormManager.populateForm("category-form", {
                        name: cat.name,
                        description: cat.description,
                    });
                };

                window.deleteCategory = function (idx) {
                    if (
                        confirm(
                            "Are you sure you want to delete this category?",
                        )
                    ) {
                        categories.splice(idx, 1);
                        dummyData.categories = [...categories];
                        renderCategoriesTable();
                        window.app.showNotification(
                            "Category deleted successfully!",
                            "success",
                        );
                    }
                };

                renderCategoriesTable();
            });
        </script>
    </body>
</html>
