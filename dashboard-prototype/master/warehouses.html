<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouses - Tool Rental Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/dummy-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/forms.js"></script>
  <script src="../js/layout.js"></script>
</head>
<body class="bg-gray-100">
  <style>
    .modal { display: none; }
    .modal.active { display: flex; }
  </style>

  <!-- Edit Modal -->
  <div id="warehouse-modal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
    <div class="bg-white rounded-lg p-8 max-w-md w-full">
      <h3 class="text-xl font-semibold text-gray-900 mb-4">Edit Warehouse</h3>
      <form id="warehouse-form" class="space-y-4">
        <input type="hidden" id="warehouse-id" />
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Warehouse Name</label>
          <input type="text" id="warehouse-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
          <input type="text" id="warehouse-location" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Capacity</label>
          <input type="number" id="warehouse-capacity" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Current Stock</label>
          <input type="number" id="warehouse-stock" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex gap-3 pt-4">
          <button type="button" onclick="closeWarehouseModal()" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">Cancel</button>
          <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function openWarehouseModal(warehouseId) {
      const warehouse = dummyData.warehouses.find(w => w.id === warehouseId);
      if (!warehouse) return;

      document.getElementById('warehouse-id').value = warehouse.id;
      document.getElementById('warehouse-name').value = warehouse.name;
      document.getElementById('warehouse-location').value = warehouse.location;
      document.getElementById('warehouse-capacity').value = warehouse.capacity;
      document.getElementById('warehouse-stock').value = warehouse.currentStock;
      document.getElementById('warehouse-modal').classList.add('active');
    }

    function closeWarehouseModal() {
      document.getElementById('warehouse-modal').classList.remove('active');
    }

    function deleteWarehouse(warehouseId) {
      if (confirm('Are you sure you want to delete this warehouse?')) {
        const idx = dummyData.warehouses.findIndex(w => w.id === warehouseId);
        if (idx !== -1) {
          dummyData.warehouses.splice(idx, 1);
          renderWarehouses();
        }
      }
    }

    function renderWarehouses() {
      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      // Group warehouses by region/location
      const grouped = {};
      dummyData.warehouses.forEach(w => {
        if (!grouped[w.location]) grouped[w.location] = [];
        grouped[w.location].push(w);
      });

      let html = `
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-xl font-semibold text-gray-900">Warehouse Management</h2>
          <button onclick="addNewWarehouse()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Add Warehouse
          </button>
        </div>
      `;

      // Render grouped by location
      Object.keys(grouped).forEach(region => {
        html += `
          <div class="mb-12">
            <h3 class="text-lg font-semibold text-gray-900 mb-4 pb-2 border-b-2 border-blue-500">${region}</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        `;

        grouped[region].forEach(warehouse => {
          const utilization = Math.round((warehouse.currentStock / warehouse.capacity) * 100);
          const utilizationColor = utilization > 80 ? 'text-red-600' : utilization > 60 ? 'text-yellow-600' : 'text-green-600';

          html += `
            <div class="bg-white rounded-lg border border-gray-200 overflow-hidden hover:shadow-lg transition">
              <!-- Header -->
              <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-4">
                <h4 class="font-bold text-lg">${warehouse.name}</h4>
                <p class="text-blue-100 text-sm">ID: ${warehouse.id}</p>
              </div>

              <!-- Content -->
              <div class="p-4 space-y-3">
                <!-- Location -->
                <div class="flex items-start gap-2">
                  <svg class="w-5 h-5 text-gray-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  </svg>
                  <div class="flex-1">
                    <p class="text-xs text-gray-600">Location</p>
                    <p class="font-semibold text-gray-900">${warehouse.location}</p>
                  </div>
                </div>

                <!-- Capacity -->
                <div class="bg-gray-50 rounded p-3">
                  <div class="flex justify-between items-center mb-2">
                    <p class="text-sm font-semibold text-gray-700">Capacity</p>
                    <span class="text-sm font-bold text-gray-900">${warehouse.currentStock}/${warehouse.capacity}</span>
                  </div>
                  <div class="w-full bg-gray-300 rounded-full h-2">
                    <div class="bg-blue-600 h-2 rounded-full transition" style="width: ${utilization}%"></div>
                  </div>
                  <p class="text-xs text-gray-600 mt-2"><span class="${utilizationColor} font-semibold">${utilization}%</span> Utilized</p>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-2 gap-2 pt-2">
                  <div class="bg-green-50 rounded p-2">
                    <p class="text-xs text-gray-600">Available</p>
                    <p class="font-bold text-green-700">${warehouse.capacity - warehouse.currentStock}</p>
                  </div>
                  <div class="bg-blue-50 rounded p-2">
                    <p class="text-xs text-gray-600">Using</p>
                    <p class="font-bold text-blue-700">${warehouse.currentStock}</p>
                  </div>
                </div>
              </div>

              <!-- Footer Actions -->
              <div class="border-t bg-gray-50 p-4 flex gap-2">
                <button onclick="openWarehouseModal(${warehouse.id})" class="flex-1 px-3 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 transition">
                  Edit
                </button>
                <button onclick="deleteWarehouse(${warehouse.id})" class="flex-1 px-3 py-2 text-sm bg-red-600 text-white rounded hover:bg-red-700 transition">
                  Delete
                </button>
              </div>
            </div>
          `;
        });

        html += `
            </div>
          </div>
        `;
      });

      pageContent.innerHTML = html;
    }

    function addNewWarehouse() {
      const name = prompt('Enter warehouse name:');
      if (!name) return;

      const location = prompt('Enter location/region:');
      if (!location) return;

      const capacity = prompt('Enter capacity:');
      if (!capacity) return;

      const newWarehouse = {
        id: Math.max(...dummyData.warehouses.map(w => w.id), 0) + 1,
        name: name,
        location: location,
        capacity: parseInt(capacity),
        currentStock: 0
      };

      dummyData.warehouses.push(newWarehouse);
      renderWarehouses();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = 'Warehouses';

      renderWarehouses();

      // Form submit
      document.getElementById('warehouse-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const id = parseInt(document.getElementById('warehouse-id').value);
        const warehouse = dummyData.warehouses.find(w => w.id === id);
        
        if (warehouse) {
          warehouse.name = document.getElementById('warehouse-name').value;
          warehouse.location = document.getElementById('warehouse-location').value;
          warehouse.capacity = parseInt(document.getElementById('warehouse-capacity').value);
          warehouse.currentStock = parseInt(document.getElementById('warehouse-stock').value);
          
          renderWarehouses();
          closeWarehouseModal();
        }
      });
    });
  </script>
</body>
</html>
