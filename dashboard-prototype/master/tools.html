<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools - Tool Rental Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/dummy-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/tables.js"></script>
  <script src="../js/forms.js"></script>
  <script src="../js/layout.js"></script>
</head>
<body class="bg-gray-100">
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = 'Tools';

      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      let tools = [...dummyData.tools];

      let html = '';

      // Add Tool Button
      html += `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-semibold text-gray-900">Tool Inventory</h2>
          <button onclick="FormManager.openModal('add-tool-modal')" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Add Tool
          </button>
        </div>
      `;

      // Tools Table
      html += '<div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">';
      html += '<div id="tools-table"></div>';
      html += '</div>';

      // Modal for Add/Edit Tool
      html += `
        <div id="add-tool-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
          <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-4">
              <h3 class="text-xl font-semibold text-gray-900">Add Tool</h3>
              <button onclick="FormManager.closeModal('add-tool-modal')" data-close-modal class="text-gray-500 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            </div>

            <form id="tool-form" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Tool Code</label>
                <input type="text" name="code" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Tool Name</label>
                <input type="text" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                <select name="category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option>Power Tools</option>
                  <option>Hand Tools</option>
                  <option>Safety Equipment</option>
                  <option>Measurement Tools</option>
                  <option>Cleaning Equipment</option>
                </select>
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Serial Number</label>
                <input type="text" name="serialNumber" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Replacement Value ($)</label>
                <input type="number" name="replacementValue" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                <select name="status" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option>Available</option>
                  <option>Rented</option>
                  <option>Damaged</option>
                  <option>Lost</option>
                </select>
              </div>

              <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
                Save Tool
              </button>
            </form>
          </div>
        </div>
      `;

      pageContent.innerHTML = html;

      // Setup form
      FormManager.setupModalClose('add-tool-modal');
      FormManager.setupFormSubmit('tool-form', (data) => {
        const newTool = {
          id: Math.max(...dummyData.tools.map(t => t.id)) + 1,
          code: data.code,
          name: data.name,
          category: data.category,
          serialNumber: data.serialNumber,
          replacementValue: parseInt(data.replacementValue),
          status: data.status,
        };

        dummyData.tools.push(newTool);
        tools = [...dummyData.tools];
        renderToolsTable();
        FormManager.closeModal('add-tool-modal');
        FormManager.clearForm('tool-form');
        window.app.showNotification('Tool added successfully!', 'success');
      });

      function renderToolsTable() {
        const tableContainer = document.getElementById('tools-table');
        let html = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b border-gray-200"><tr>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Code</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Name</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Category</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Serial Number</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Value</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Status</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Actions</th>';
        html += '</tr></thead><tbody>';

        tools.forEach((tool, idx) => {
          const statusColor = App.getStatusBadgeColor(tool.status);
          html += `
            <tr class="border-b hover:bg-gray-50 transition">
              <td class="px-6 py-4">${tool.code}</td>
              <td class="px-6 py-4 font-semibold">${tool.name}</td>
              <td class="px-6 py-4">${tool.category}</td>
              <td class="px-6 py-4 text-gray-600">${tool.serialNumber}</td>
              <td class="px-6 py-4">${App.formatCurrency(tool.replacementValue)}</td>
              <td class="px-6 py-4"><span class="px-2 py-1 text-xs font-semibold rounded ${statusColor}">${tool.status}</span></td>
              <td class="px-6 py-4">
                <div class="flex gap-2">
                  <button onclick="editTool(${idx})" class="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 text-xs">Edit</button>
                  <button onclick="deleteTool(${idx})" class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 text-xs">Delete</button>
                </div>
              </td>
            </tr>
          `;
        });

        html += '</tbody></table></div>';
        tableContainer.innerHTML = html;
      }

      window.editTool = function(idx) {
        const tool = tools[idx];
        FormManager.openModal('add-tool-modal');
        document.querySelector('#add-tool-modal h3').textContent = 'Edit Tool';
        FormManager.populateForm('tool-form', {
          code: tool.code,
          name: tool.name,
          category: tool.category,
          serialNumber: tool.serialNumber,
          replacementValue: tool.replacementValue,
          status: tool.status,
        });
      };

      window.deleteTool = function(idx) {
        if (confirm('Are you sure you want to delete this tool?')) {
          tools.splice(idx, 1);
          dummyData.tools = [...tools];
          renderToolsTable();
          window.app.showNotification('Tool deleted successfully!', 'success');
        }
      };

      renderToolsTable();
    });
  </script>
</body>
</html>
