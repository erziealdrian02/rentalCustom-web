<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - Tool Rental Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/dummy-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/forms.js"></script>
  <script src="../js/layout.js"></script>
</head>
<body class="bg-gray-100">
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = 'Customers';

      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      let customers = [...dummyData.customers];

      let html = `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-semibold text-gray-900">Customer Management</h2>
          <button onclick="FormManager.openModal('add-customer-modal')" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Add Customer
          </button>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
          <div id="customers-table"></div>
        </div>

        <div id="add-customer-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
          <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-4">
              <h3 class="text-xl font-semibold text-gray-900">Add Customer</h3>
              <button onclick="FormManager.closeModal('add-customer-modal')" data-close-modal class="text-gray-500 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            </div>

            <form id="customer-form" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Customer Name</label>
                <input type="text" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
                <input type="tel" name="phone" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                <select name="status" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option>Active</option>
                  <option>Inactive</option>
                </select>
              </div>

              <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
                Save Customer
              </button>
            </form>
          </div>
        </div>
      `;

      pageContent.innerHTML = html;

      FormManager.setupModalClose('add-customer-modal');
      FormManager.setupFormSubmit('customer-form', (data) => {
        const newCustomer = {
          id: Math.max(...dummyData.customers.map(c => c.id)) + 1,
          name: data.name,
          email: data.email,
          phone: data.phone,
          status: data.status,
        };

        dummyData.customers.push(newCustomer);
        customers = [...dummyData.customers];
        renderCustomersTable();
        FormManager.closeModal('add-customer-modal');
        FormManager.clearForm('customer-form');
        window.app.showNotification('Customer added successfully!', 'success');
      });

      function renderCustomersTable() {
        const tableContainer = document.getElementById('customers-table');
        let html = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b border-gray-200"><tr>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Name</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Email</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Phone</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Status</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Actions</th>';
        html += '</tr></thead><tbody>';

        customers.forEach((customer, idx) => {
          const statusColor = App.getStatusBadgeColor(customer.status);
          html += `
            <tr class="border-b hover:bg-gray-50 transition">
              <td class="px-6 py-4 font-semibold">${customer.name}</td>
              <td class="px-6 py-4 text-gray-600">${customer.email}</td>
              <td class="px-6 py-4">${customer.phone}</td>
              <td class="px-6 py-4"><span class="px-2 py-1 text-xs font-semibold rounded ${statusColor}">${customer.status}</span></td>
              <td class="px-6 py-4">
                <div class="flex gap-2">
                  <button onclick="editCustomer(${idx})" class="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 text-xs">Edit</button>
                  <button onclick="deleteCustomer(${idx})" class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 text-xs">Delete</button>
                </div>
              </td>
            </tr>
          `;
        });

        html += '</tbody></table></div>';
        tableContainer.innerHTML = html;
      }

      window.editCustomer = function(idx) {
        const customer = customers[idx];
        FormManager.openModal('add-customer-modal');
        document.querySelector('#add-customer-modal h3').textContent = 'Edit Customer';
        FormManager.populateForm('customer-form', {
          name: customer.name,
          email: customer.email,
          phone: customer.phone,
          status: customer.status,
        });
      };

      window.deleteCustomer = function(idx) {
        if (confirm('Are you sure you want to delete this customer?')) {
          customers.splice(idx, 1);
          dummyData.customers = [...customers];
          renderCustomersTable();
          window.app.showNotification('Customer deleted successfully!', 'success');
        }
      };

      renderCustomersTable();
    });
  </script>
</body>
</html>
