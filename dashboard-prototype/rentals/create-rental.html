<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Rental - Tool Rental Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/dummy-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
</head>
<body class="bg-gray-100">
  <script>
    let rentalItems = [];
    let nextItemId = 1;

    document.addEventListener('DOMContentLoaded', () => {
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = 'Create New Rental';

      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      let html = `
        <div class="max-w-full">
          <h2 class="text-2xl font-semibold text-gray-900 mb-6">New Rental Transaction</h2>

          <!-- Main Two-Column Layout -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" style="height: calc(100vh - 180px); min-height: 600px;">

            <!-- LEFT COLUMN: Rental Details Form -->
            <div class="flex flex-col gap-6 overflow-y-auto pr-1">

              <!-- Customer + Add Tools Card -->
              <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Rental Details</h3>

                <div class="mb-6">
                  <label class="block text-sm font-medium text-gray-700 mb-2">Customer *</label>
                  <select id="customerId" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Select Customer</option>
                    ${dummyData.customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                  </select>
                </div>

                <h3 class="text-lg font-semibold text-gray-900 mb-4 mt-2">Add Tools to Rental</h3>

                <div class="space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label class="block text-sm font-medium text-gray-700 mb-2">Tool *</label>
                      <select id="toolId" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Select Tool</option>
                        ${dummyData.tools.filter(t => t.status === 'Available').map(t => `<option value="${t.id}">${t.name} (${t.code})</option>`).join('')}
                      </select>
                    </div>
                    <div>
                      <label class="block text-sm font-medium text-gray-700 mb-2">Quantity *</label>
                      <input type="number" id="quantity" value="1" min="1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                  </div>

                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label class="block text-sm font-medium text-gray-700 mb-2">Start Date *</label>
                      <input type="date" id="startDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                      <label class="block text-sm font-medium text-gray-700 mb-2">End Date *</label>
                      <input type="date" id="endDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                  </div>

                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label class="block text-sm font-medium text-gray-700 mb-2">Rental Duration Type *</label>
                      <select id="durationType" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                      </select>
                    </div>
                    <div>
                      <label class="block text-sm font-medium text-gray-700 mb-2">Daily Rate *</label>
                      <input type="number" id="dailyRate" step="0.01" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-100" readonly>
                    </div>
                  </div>

                  <button type="button" onclick="addRentalItem()" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">
                    + Add Tool to Rental
                  </button>
                </div>
              </div>

              <!-- Rental Summary Card -->
              <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Rental Summary</h3>
                <div id="rentalSummary" class="space-y-3 mb-6">
                  <p class="text-gray-600 text-sm">No items added yet</p>
                </div>
                <button type="button" onclick="submitRental()" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition font-medium disabled:bg-gray-400 disabled:cursor-not-allowed" id="submitBtn" disabled>
                  Submit Rental
                </button>
              </div>
            </div>

            <!-- RIGHT COLUMN: Tools Added (scrollable container) -->
            <div class="flex flex-col bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
              <div class="px-6 py-4 border-b border-gray-200 flex-shrink-0">
                <h3 class="text-lg font-semibold text-gray-900">Tools Added to This Rental</h3>
              </div>
              <div id="rentalItemsList" class="flex-1 overflow-y-auto p-6 space-y-4">
                <p class="text-gray-600 text-center py-8">No items added yet. Add tools above to start building the rental.</p>
              </div>
            </div>

          </div>
        </div>
      `;

      pageContent.innerHTML = html;

      const today = new Date().toISOString().split('T')[0];
      document.getElementById('startDate').value = today;

      document.getElementById('toolId').addEventListener('change', updateDailyRate);

      updateRentalSummary();
    });

    function updateDailyRate() {
      const toolId = parseInt(document.getElementById('toolId').value);
      const pricing = dummyData.pricing.find(p => p.toolId === toolId);
      document.getElementById('dailyRate').value = pricing ? pricing.dailyRate : 0;
    }

    function calculateDays() {
      const startDate = new Date(document.getElementById('startDate').value);
      const endDate = new Date(document.getElementById('endDate').value);
      const diffTime = Math.abs(endDate - startDate);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      return diffDays || 1;
    }

    function addRentalItem() {
      const customerId = document.getElementById('customerId').value;
      const toolId = parseInt(document.getElementById('toolId').value);
      const quantity = parseInt(document.getElementById('quantity').value) || 1;
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const durationType = document.getElementById('durationType').value;
      const dailyRate = parseFloat(document.getElementById('dailyRate').value) || 0;

      if (!customerId) { alert('Please select a customer'); return; }
      if (!toolId) { alert('Please select a tool'); return; }
      if (!startDate || !endDate) { alert('Please select start and end dates'); return; }
      if (new Date(startDate) > new Date(endDate)) { alert('End date must be after start date'); return; }
      if (dailyRate === 0) { alert('Please select a valid tool with pricing'); return; }

      const tool = dummyData.tools.find(t => t.id === toolId);
      const days = calculateDays();
      const subtotal = quantity * dailyRate * days;

      const item = {
        id: nextItemId++,
        toolId,
        toolName: tool.name,
        quantity,
        startDate,
        endDate,
        durationType,
        dailyRate,
        days,
        subtotal
      };

      rentalItems.push(item);
      updateRentalSummary();

      document.getElementById('toolId').value = '';
      document.getElementById('quantity').value = '1';
      document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('endDate').value = '';
      document.getElementById('dailyRate').value = '';
    }

    function removeRentalItem(itemId) {
      rentalItems = rentalItems.filter(item => item.id !== itemId);
      updateRentalSummary();
    }

    function updateRentalSummary() {
      const summaryDiv = document.getElementById('rentalSummary');
      const itemsListDiv = document.getElementById('rentalItemsList');
      const submitBtn = document.getElementById('submitBtn');
      const customerId = document.getElementById('customerId').value;

      if (rentalItems.length === 0) {
        summaryDiv.innerHTML = '<p class="text-gray-600 text-sm">No items added yet</p>';
        itemsListDiv.innerHTML = '<p class="text-gray-600 text-center py-8">No items added yet. Add tools above to start building the rental.</p>';
        submitBtn.disabled = true;
        return;
      }

      const totalPrice = rentalItems.reduce((sum, item) => sum + item.subtotal, 0);

      // Update summary
      summaryDiv.innerHTML = `
        <div class="border-b border-gray-200 pb-3">
          <p class="text-gray-600 text-sm">Items: <span class="font-semibold text-gray-900">${rentalItems.length}</span></p>
          <p class="text-gray-600 text-sm">Total Price: <span class="font-bold text-lg text-green-600">${App.formatCurrency(totalPrice)}</span></p>
        </div>
        <div class="text-xs text-gray-500 space-y-1">
          ${rentalItems.map(item => `
            <p>${item.quantity}x ${item.toolName}</p>
          `).join('')}
        </div>
      `;

      // Update items list
      itemsListDiv.innerHTML = rentalItems.map(item => `
        <div class="bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
          <div class="flex justify-between items-start mb-3">
            <div>
              <h4 class="font-semibold text-gray-900">${item.toolName}</h4>
              <p class="text-sm text-gray-600">${item.quantity}x @ ${App.formatCurrency(item.dailyRate)}/day</p>
            </div>
            <button onclick="removeRentalItem(${item.id})" class="text-red-600 hover:text-red-700 font-medium text-sm">Remove</button>
          </div>
          <div class="grid grid-cols-2 gap-2 text-sm text-gray-600 mb-3">
            <div>
              <p class="text-xs text-gray-500 uppercase">Start Date</p>
              <p class="font-medium text-gray-900">${new Date(item.startDate).toLocaleDateString()}</p>
            </div>
            <div>
              <p class="text-xs text-gray-500 uppercase">End Date</p>
              <p class="font-medium text-gray-900">${new Date(item.endDate).toLocaleDateString()}</p>
            </div>
            <div>
              <p class="text-xs text-gray-500 uppercase">Duration</p>
              <p class="font-medium text-gray-900">${item.days} days</p>
            </div>
            <div>
              <p class="text-xs text-gray-500 uppercase">Type</p>
              <p class="font-medium text-gray-900 capitalize">${item.durationType}</p>
            </div>
          </div>
          <div class="bg-blue-50 p-3 rounded border border-blue-100">
            <p class="text-sm text-blue-900">Subtotal: <span class="font-bold text-lg">${App.formatCurrency(item.subtotal)}</span></p>
          </div>
        </div>
      `).join('');

      submitBtn.disabled = !customerId || rentalItems.length === 0;
    }

    function submitRental() {
      const customerId = parseInt(document.getElementById('customerId').value);
      
      if (!customerId || rentalItems.length === 0) {
        alert('Please select a customer and add at least one tool');
        return;
      }

      const customer = dummyData.customers.find(c => c.id === customerId);
      const totalPrice = rentalItems.reduce((sum, item) => sum + item.subtotal, 0);
      const invoiceNumber = 'INV-' + new Date().getFullYear() + '-' + String(dummyData.rentals.length + 1).padStart(3, '0');

      // Create rental object with items
      const newRental = {
        id: Math.max(...dummyData.rentals.map(r => r.id), 0) + 1,
        invoiceNumber,
        customerId,
        customerName: customer.name,
        items: rentalItems.map(item => ({
          toolId: item.toolId,
          toolName: item.toolName,
          quantity: item.quantity,
          startDate: item.startDate,
          endDate: item.endDate,
          durationType: item.durationType,
          dailyRate: item.dailyRate,
          subtotal: item.subtotal
        })),
        totalPrice,
        status: 'Active',
        createdDate: new Date().toISOString().split('T')[0],
        rentalStartDate: Math.min(...rentalItems.map(i => new Date(i.startDate))).toISOString().split('T')[0],
        rentalEndDate: Math.max(...rentalItems.map(i => new Date(i.endDate))).toISOString().split('T')[0]
      };

      // Add to dummy data
      dummyData.rentals.push(newRental);

      // Show success message
      alert('Rental created successfully! Invoice: ' + invoiceNumber);

      // Redirect to rentals list
      setTimeout(() => {
        window.location.href = 'rentals.html';
      }, 1500);
    }
  </script>
</body>
</html>
