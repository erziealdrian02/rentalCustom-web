<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Overview - Tool Rental Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/dummy-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
</head>
<body class="bg-gray-100">
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = 'Stock Overview';

      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      let html = `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-semibold text-gray-900">Warehouse Stock Overview</h2>
          <div class="flex gap-2">
            <select id="warehouse-filter" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">All Warehouses</option>
              ${dummyData.warehouses.map(w => `<option value="${w.name}">${w.name}</option>`).join('')}
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Total Items in Stock</p>
            <p class="text-3xl font-bold text-gray-900 mt-2" id="total-items">0</p>
          </div>

          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Total Tools</p>
            <p class="text-3xl font-bold text-gray-900 mt-2">${dummyData.stockOverview.length}</p>
          </div>

          <div class="bg-white rounded-lg p-6 border border-gray-200 shadow-sm">
            <p class="text-gray-600 text-sm font-medium">Low Stock Items</p>
            <p class="text-3xl font-bold text-red-600 mt-2" id="low-stock-count">0</p>
          </div>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
          <div id="stock-table"></div>
        </div>
      `;

      pageContent.innerHTML = html;

      function renderStockTable(warehouseFilter = '') {
        const filteredStock = warehouseFilter 
          ? dummyData.stockOverview.filter(s => s.warehouseName === warehouseFilter)
          : dummyData.stockOverview;

        const tableContainer = document.getElementById('stock-table');
        let html = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b border-gray-200"><tr>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Tool Name</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Warehouse</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Quantity</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Status</th>';
        html += '<th class="px-6 py-3 text-left font-semibold text-gray-700">Utilization</th>';
        html += '</tr></thead><tbody>';

        let totalItems = 0;
        let lowStockCount = 0;

        filteredStock.forEach(stock => {
          totalItems += stock.quantity;
          const isLowStock = stock.quantity < 3;
          if (isLowStock) lowStockCount++;

          const statusColor = stock.status === 'Good' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
          const stockAlert = isLowStock ? '<span class="inline-block px-2 py-1 text-xs font-semibold rounded bg-red-100 text-red-800 ml-2">Low Stock</span>' : '';

          html += `
            <tr class="border-b hover:bg-gray-50 transition">
              <td class="px-6 py-4 font-semibold">${stock.toolName}</td>
              <td class="px-6 py-4">${stock.warehouseName}</td>
              <td class="px-6 py-4">
                <div class="flex items-center gap-2">
                  <span class="font-semibold">${stock.quantity}</span>
                  ${stockAlert}
                </div>
              </td>
              <td class="px-6 py-4"><span class="px-2 py-1 text-xs font-semibold rounded ${statusColor}">${stock.status}</span></td>
              <td class="px-6 py-4">
                <div class="w-32 bg-gray-200 rounded-full h-2">
                  <div class="bg-blue-600 h-2 rounded-full" style="width: ${Math.min(stock.quantity * 10, 100)}%"></div>
                </div>
              </td>
            </tr>
          `;
        });

        html += '</tbody></table></div>';
        tableContainer.innerHTML = html;

        document.getElementById('total-items').textContent = totalItems;
        document.getElementById('low-stock-count').textContent = lowStockCount;
      }

      document.getElementById('warehouse-filter').addEventListener('change', (e) => {
        renderStockTable(e.target.value);
      });

      renderStockTable();
    });
  </script>
</body>
</html>
