<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Tracking - Tool Rental Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/dummy-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
</head>
<body class="bg-gray-100">
  <style>
    .modal { display: none; }
    .modal.active { display: flex; }
  </style>

  <!-- Delivery Completion Modal -->
  <div id="completeModal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
    <div class="bg-white rounded-lg p-8 max-w-md w-full">
      <h3 class="text-xl font-semibold text-gray-900 mb-4">Mark Delivery Complete</h3>
      <form id="completeForm" class="space-y-4">
        <input type="hidden" id="deliveryId" />
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Upload Proof Photo</label>
          <input type="file" id="proofPhoto" accept="image/*" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          <p class="text-xs text-gray-600 mt-1">Upload photo as proof of delivery</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Notes</label>
          <textarea id="notes" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" rows="3"></textarea>
        </div>
        <div class="flex gap-3 pt-4">
          <button type="button" onclick="closeCompleteModal()" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">Cancel</button>
          <button type="submit" class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Complete Delivery</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function openCompleteModal(deliveryId) {
      document.getElementById('deliveryId').value = deliveryId;
      document.getElementById('completeModal').classList.add('active');
    }

    function closeCompleteModal() {
      document.getElementById('completeModal').classList.remove('active');
      document.getElementById('completeForm').reset();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = 'Driver Tracking';

      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      // Get active deliveries for current driver
      const currentDriverId = 1; // In real app, this would be from auth
      const activeDeliveries = dummyData.shippings.filter(d => d.driverId === currentDriverId);

      let html = `
        <div class="mb-8">
          <h2 class="text-xl font-semibold text-gray-900 mb-4">My Deliveries</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white rounded-lg p-4 border border-gray-200">
              <p class="text-gray-600 text-sm">Assigned Deliveries</p>
              <p class="text-3xl font-bold text-gray-900">${activeDeliveries.length}</p>
            </div>
            <div class="bg-white rounded-lg p-4 border border-gray-200">
              <p class="text-gray-600 text-sm">Completed Today</p>
              <p class="text-3xl font-bold text-green-600">${activeDeliveries.filter(d => d.status === 'Delivered').length}</p>
            </div>
            <div class="bg-white rounded-lg p-4 border border-gray-200">
              <p class="text-gray-600 text-sm">In Progress</p>
              <p class="text-3xl font-bold text-blue-600">${activeDeliveries.filter(d => d.status === 'In Transit').length}</p>
            </div>
          </div>
        </div>

        <div class="space-y-6">
      `;

      activeDeliveries.forEach(delivery => {
        const statusIcon = delivery.status === 'Delivered' ? '✓' : delivery.status === 'In Transit' ? '→' : '⏱';
        const statusColor = delivery.status === 'Delivered' ? 'bg-green-50 border-green-200' : delivery.status === 'In Transit' ? 'bg-blue-50 border-blue-200' : 'bg-yellow-50 border-yellow-200';

        html += `
          <div class="bg-white rounded-lg border ${statusColor} p-6 shadow-sm">
            <div class="flex items-start justify-between mb-4">
              <div>
                <h3 class="text-lg font-semibold text-gray-900">${delivery.deliveryNumber}</h3>
                <p class="text-gray-600 text-sm">${delivery.rentals[0].customerName}</p>
              </div>
              <span class="text-3xl">${statusIcon}</span>
            </div>

            <!-- Route Information -->
            <div class="bg-gray-50 rounded-lg p-4 mb-4">
              <div class="flex items-center gap-4">
                <div>
                  <p class="text-xs text-gray-600 uppercase font-semibold">From</p>
                  <p class="font-semibold text-gray-900">${delivery.rentals[0].fromLocation}</p>
                </div>
                <div class="flex-1 text-center">
                  <svg class="w-6 h-6 text-gray-400 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                  </svg>
                </div>
                <div>
                  <p class="text-xs text-gray-600 uppercase font-semibold">To</p>
                  <p class="font-semibold text-gray-900">${delivery.rentals[0].toLocation}</p>
                </div>
              </div>
            </div>

            <!-- Items -->
            <div class="mb-4">
              <h4 class="text-sm font-semibold text-gray-900 mb-2">Items to Deliver</h4>
              <div class="space-y-2">
                ${delivery.rentals.map((rental, idx) => `
                  <div class="flex items-center justify-between text-sm p-2 bg-gray-100 rounded">
                    <span class="font-semibold text-gray-900">Invoice: ${rental.invoiceNumber}</span>
                    <span class="text-xs bg-blue-200 text-blue-800 px-2 py-1 rounded">${rental.items} items</span>
                  </div>
                `).join('')}
              </div>
            </div>

            <!-- Timeline -->
            <div class="grid grid-cols-2 gap-2 mb-4">
              <div class="bg-gray-100 rounded p-2">
                <p class="text-xs text-gray-600">Departed</p>
                <p class="font-semibold text-gray-900 text-sm">${delivery.departureTime}</p>
              </div>
              ${delivery.arrivalTime ? `
                <div class="bg-green-100 rounded p-2">
                  <p class="text-xs text-gray-600">Arrived</p>
                  <p class="font-semibold text-green-900 text-sm">${delivery.arrivalTime}</p>
                </div>
              ` : `
                <div class="bg-yellow-100 rounded p-2">
                  <p class="text-xs text-gray-600">Estimated</p>
                  <p class="font-semibold text-yellow-900 text-sm">In Transit</p>
                </div>
              `}
            </div>

            <!-- Action Button -->
            ${delivery.status !== 'Delivered' ? `
              <button onclick="openCompleteModal(${delivery.id})" class="w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-semibold transition">
                Mark as Completed
              </button>
            ` : `
              <div class="w-full px-4 py-2 bg-green-100 text-green-800 rounded-lg text-center font-semibold">
                Delivery Completed
              </div>
            `}
          </div>
        `;
      });

      html += '</div>';

      pageContent.innerHTML = html;

      // Handle form submission
      document.getElementById('completeForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const deliveryId = parseInt(document.getElementById('deliveryId').value);
        const delivery = dummyData.shippings.find(d => d.id === deliveryId);
        
        if (delivery) {
          delivery.status = 'Delivered';
          delivery.arrivalTime = new Date().toLocaleString();
          delivery.notes = document.getElementById('notes').value || 'Delivery completed successfully';
          
          document.addEventListener('DOMContentLoaded', () => {
            location.reload();
          });
          location.reload();
        }
      });
    });
  </script>
</body>
</html>
