<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Shipping - Tool Rental Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/dummy-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
</head>
<body class="bg-gray-100">
  <script>
    let addedRentals = [];

    function addRentalToShipment() {
      const rentalSelect = document.getElementById('rentalSelect');
      const fromLocation = document.getElementById('fromLocation');
      const toLocation = document.getElementById('toLocation');
      const driverSelect = document.getElementById('driverSelect');

      if (!rentalSelect.value || !fromLocation.value || !toLocation.value || !driverSelect.value) {
        alert('Please fill in all fields');
        return;
      }

      const rentalId = parseInt(rentalSelect.value);
      const rental = dummyData.rentals.find(r => r.id === rentalId);

      if (!rental) return;

      const alreadyAdded = addedRentals.find(r => r.rentalId === rentalId);
      if (alreadyAdded) {
        alert('This rental is already added to the shipment');
        return;
      }

      const item = {
        rentalId: rentalId,
        invoiceNumber: rental.invoiceNumber,
        customerName: rental.customerName,
        itemCount: rental.items.length,
        fromLocation: fromLocation.value,
        toLocation: toLocation.value,
      };

      addedRentals.push(item);
      renderRentals();
      
      // Reset fields
      rentalSelect.value = '';
      fromLocation.value = '';
      toLocation.value = '';
    }

    function removeRental(rentalId) {
      addedRentals = addedRentals.filter(r => r.rentalId !== rentalId);
      renderRentals();
    }

    function renderRentals() {
      const container = document.getElementById('added-rentals');
      if (addedRentals.length === 0) {
        container.innerHTML = '<p class="text-gray-600 italic">No rentals added yet. Add rentals to create a shipment.</p>';
        return;
      }

      let html = '<div class="space-y-3">';
      addedRentals.forEach(item => {
        html += `
          <div class="border rounded-lg p-4 bg-gray-50 flex items-center justify-between">
            <div class="flex-1">
              <p class="font-semibold text-gray-900">${item.invoiceNumber}</p>
              <p class="text-sm text-gray-600">${item.customerName} - ${item.itemCount} items</p>
              <p class="text-xs text-gray-600 mt-1">${item.fromLocation} → ${item.toLocation}</p>
            </div>
            <button type="button" onclick="removeRental(${item.rentalId})" class="px-3 py-2 text-red-600 hover:bg-red-50 rounded">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
            </button>
          </div>
        `;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    function submitShipment() {
      if (addedRentals.length === 0) {
        alert('Please add at least one rental to the shipment');
        return;
      }

      const driverSelect = document.getElementById('driverSelect');
      const driverId = parseInt(driverSelect.value);
      const driver = dummyData.drivers.find(d => d.id === driverId);

      if (!driver) {
        alert('Please select a driver');
        return;
      }

      // Create new shipment
      const deliveryNumber = 'DEL-2024-' + String(dummyData.shippings.length + 1).padStart(3, '0');
      const newShipment = {
        id: Math.max(...dummyData.shippings.map(s => s.id), 0) + 1,
        deliveryNumber: deliveryNumber,
        driverId: driverId,
        driverName: driver.name,
        rentals: addedRentals.map(item => {
          const rental = dummyData.rentals.find(r => r.id === item.rentalId);
          return {
            rentalId: item.rentalId,
            invoiceNumber: item.invoiceNumber,
            customerId: rental.customerId,
            customerName: item.customerName,
            fromLocation: item.fromLocation,
            toLocation: item.toLocation,
            items: item.itemCount
          };
        }),
        departureTime: new Date().toLocaleString(),
        arrivalTime: null,
        status: 'Pending',
        proofImage: null,
        notes: 'Shipment created'
      };

      dummyData.shippings.push(newShipment);
      alert('Shipment created successfully: ' + deliveryNumber);
      window.location.href = 'shipping-list.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = 'Create Delivery';

      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      let html = `
        <div class="max-w-4xl">
          <h2 class="text-xl font-semibold text-gray-900 mb-6">Create Delivery Shipment</h2>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-2">
              <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6 space-y-6">
                <!-- Add Rental Section -->
                <div class="border-b pb-6">
                  <h3 class="text-lg font-semibold text-gray-900 mb-4">Add Rentals to Shipment</h3>

                  <div class="space-y-4">
                    <div>
                      <label class="block text-sm font-medium text-gray-700 mb-2">Select Rental</label>
                      <select id="rentalSelect" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Choose a rental to add</option>
                        ${dummyData.rentals.filter(r => r.rentalStatus !== 'On Check' && r.rentalStatus !== 'Delivered').map(r => `
                          <option value="${r.id}">${r.invoiceNumber} - ${r.customerName}</option>
                        `).join('')}
                      </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                      <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">From Location</label>
                        <input type="text" id="fromLocation" placeholder="e.g., Main Warehouse" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                      </div>
                      <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">To Location</label>
                        <input type="text" id="toLocation" placeholder="e.g., Customer Site" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                      </div>
                    </div>

                    <button type="button" onclick="addRentalToShipment()" class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold transition">
                      Add Rental
                    </button>
                  </div>
                </div>

                <!-- Driver Selection -->
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">Assign Driver</label>
                  <select id="driverSelect" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Select a driver</option>
                    ${dummyData.drivers.filter(d => d.status === 'Active').map(d => `
                      <option value="${d.id}">${d.name} - ${d.vehicleType}</option>
                    `).join('')}
                  </select>
                </div>

                <!-- Submit Button -->
                <button type="button" onclick="submitShipment()" class="w-full px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-semibold text-lg transition">
                  Create Shipment
                </button>
              </div>
            </div>

            <!-- Summary Section -->
            <div>
              <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6 sticky top-24">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Shipment Summary</h3>
                
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                  <p class="text-gray-600 text-sm">Rentals Added</p>
                  <p class="text-3xl font-bold text-blue-600" id="rental-count">0</p>
                </div>

                <div class="border-t pt-4">
                  <h4 class="font-semibold text-gray-900 mb-3">Added Rentals</h4>
                  <div id="added-rentals" class="text-gray-600 italic">
                    No rentals added yet. Add rentals to create a shipment.
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      pageContent.innerHTML = html;

      // Update rental count observer
      const observer = setInterval(() => {
        const count = document.getElementById('rental-count');
        if (count) {
          count.textContent = addedRentals.length;
        }
      }, 100);
    });
  </script>
</body>
</html>
