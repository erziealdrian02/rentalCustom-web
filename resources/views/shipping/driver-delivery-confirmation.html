<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Driver Delivery - Pengiriman</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/dummy-data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
</head>
<body class="bg-gray-100">
  <style>
    /* Responsive adjustments */
    @media (max-width: 640px) {
      .delivery-grid {
        gap: 12px;
      }
    }

    /* Image preview styles */
    .image-preview {
      max-width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 8px;
    }

    /* Modal styles */
    .modal {
      display: none;
    }

    .modal.active {
      display: flex;
    }
  </style>

  <!-- Success Modal -->
  <div id="successModal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
    <div class="bg-white rounded-lg max-w-sm w-full text-center p-6 sm:p-8">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h3 class="text-lg sm:text-xl font-bold text-gray-900 mb-2">Pengiriman Selesai!</h3>
      <p class="text-gray-600 mb-6 text-sm sm:text-base">Terima kasih telah menyelesaikan pengiriman.</p>
      <button onclick="closeSuccessModal()" class="w-full bg-green-600 text-white py-2 sm:py-3 rounded-lg font-semibold hover:bg-green-700">
        Lanjut Pengiriman Berikutnya
      </button>
    </div>
  </div>

  <script>
    let currentDeliveryId = null;
    let deliveryProofImage = null;

    document.addEventListener('DOMContentLoaded', () => {
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = 'Delivery Confirmation';

      renderDeliveryList();
    });

    function renderDeliveryList() {
      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      // Filter deliveries yang belum delivered
      const pendingDeliveries = dummyData.shippings.filter(d => d.status !== 'Delivered');

      let html = `
        <div class="max-w-6xl mx-auto">
          <div class="mb-6">
            <h2 class="text-xl sm:text-2xl font-bold text-gray-900">Pengiriman Saya</h2>
            <p class="text-gray-600 text-sm mt-1">Total pengiriman menunggu: <span class="font-semibold text-blue-600">${pendingDeliveries.length}</span></p>
          </div>
      `;

      if (pendingDeliveries.length === 0) {
        html += `
          <div class="bg-white rounded-lg p-8 text-center">
            <svg class="w-16 h-16 text-gray-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">Tidak ada pengiriman menunggu</h3>
            <p class="text-gray-600">Semua pengiriman Anda telah selesai!</p>
          </div>
        `;
      } else {
        html += `<div class="space-y-4">`;

        pendingDeliveries.forEach(delivery => {
          const departureTime = new Date(delivery.departureTime);
          const timeString = departureTime.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
          
          const rentalInfo = delivery.rentals[0];
          const totalItems = delivery.rentals.reduce((sum, r) => sum + (r.items || 0), 0);

          html += `
            <button onclick="selectDelivery(${delivery.id})" class="w-full bg-white rounded-lg border border-gray-200 overflow-hidden hover:shadow-lg transition text-left p-0">
              <div class="p-4 sm:p-6">
                <!-- Header -->
                <div class="flex items-start justify-between gap-4 mb-4">
                  <div class="flex-1">
                    <h3 class="text-base sm:text-lg font-bold text-gray-900">${delivery.deliveryNumber}</h3>
                    <p class="text-gray-600 text-sm">${rentalInfo.customerName}</p>
                  </div>
                  <span class="px-3 py-1 rounded-full text-xs font-semibold whitespace-nowrap ${App.getStatusBadgeColor(delivery.status)}">
                    ${delivery.status}
                  </span>
                </div>

                <!-- Location -->
                <div class="grid grid-cols-2 gap-4 mb-4 pb-4 border-b">
                  <div>
                    <p class="text-xs text-gray-600 uppercase font-semibold mb-1">Dari</p>
                    <p class="text-sm font-semibold text-gray-900">${rentalInfo.fromLocation}</p>
                  </div>
                  <div>
                    <p class="text-xs text-gray-600 uppercase font-semibold mb-1">Ke</p>
                    <p class="text-sm font-semibold text-gray-900">${rentalInfo.toLocation}</p>
                  </div>
                </div>

                <!-- Details Grid -->
                <div class="grid grid-cols-3 gap-3 text-sm">
                  <div>
                    <p class="text-xs text-gray-600 uppercase font-semibold">Waktu</p>
                    <p class="font-semibold text-gray-900">${timeString}</p>
                  </div>
                  <div>
                    <p class="text-xs text-gray-600 uppercase font-semibold">Supir</p>
                    <p class="font-semibold text-gray-900 truncate">${delivery.driverName}</p>
                  </div>
                  <div>
                    <p class="text-xs text-gray-600 uppercase font-semibold">Barang</p>
                    <p class="font-semibold text-gray-900">${totalItems} item</p>
                  </div>
                </div>
              </div>
            </button>
          `;
        });

        html += '</div>';
      }

      html += '</div>';
      pageContent.innerHTML = html;
    }

    function selectDelivery(deliveryId) {
      currentDeliveryId = deliveryId;
      showDeliveryDetail();
    }

    function showDeliveryDetail() {
      const pageContent = document.getElementById('page-content');
      if (!pageContent) return;

      const delivery = dummyData.shippings.find(d => d.id === currentDeliveryId);
      if (!delivery) return;

      const rentalInfo = delivery.rentals[0];
      const departureTime = new Date(delivery.departureTime);
      const driver = dummyData.drivers.find(d => d.id === delivery.driverId);

      // Parse items dari rental
      let itemsHtml = '';
      if (rentalInfo.items && typeof rentalInfo.items === 'string') {
        const items = rentalInfo.items.split(',').map(i => i.trim()).filter(i => i);
        itemsHtml = items.map(item => `
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 sm:p-4">
            <div class="flex items-start gap-3">
              <svg class="w-5 h-5 text-blue-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
              </svg>
              <div class="flex-1 min-w-0">
                <p class="font-semibold text-gray-900 text-sm sm:text-base break-words">${item}</p>
              </div>
            </div>
          </div>
        `).join('');
      }

      let html = `
        <div class="max-w-4xl mx-auto">
          <!-- Back Button -->
          <button onclick="renderDeliveryList()" class="mb-4 flex items-center gap-2 text-blue-600 hover:text-blue-700 font-semibold text-sm sm:text-base">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Kembali
          </button>

          <!-- Delivery Header -->
          <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-lg p-4 sm:p-6 mb-6">
            <h1 class="text-2xl sm:text-3xl font-bold mb-2">${delivery.deliveryNumber}</h1>
            <p class="text-blue-100">Pelanggan: ${rentalInfo.customerName}</p>
          </div>

          <!-- Main Content Grid -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <!-- Left: Delivery Information -->
            <div class="bg-white rounded-lg border border-gray-200 p-4 sm:p-6">
              <h2 class="text-lg sm:text-xl font-bold text-gray-900 mb-4">Informasi Pengiriman</h2>
              
              <!-- Location Info -->
              <div class="mb-6">
                <div class="bg-gray-50 rounded-lg p-4 mb-4">
                  <p class="text-xs text-gray-600 uppercase font-semibold mb-2">Dari (Asal)</p>
                  <p class="text-base sm:text-lg font-bold text-gray-900">${rentalInfo.fromLocation}</p>
                </div>
                
                <div class="flex justify-center mb-4">
                  <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                  </svg>
                </div>

                <div class="bg-gray-50 rounded-lg p-4">
                  <p class="text-xs text-gray-600 uppercase font-semibold mb-2">Ke (Tujuan)</p>
                  <p class="text-base sm:text-lg font-bold text-gray-900">${rentalInfo.toLocation}</p>
                </div>
              </div>

              <!-- Time & Driver Info -->
              <div class="border-t pt-4">
                <div class="mb-4">
                  <p class="text-xs text-gray-600 uppercase font-semibold mb-1">Waktu Pengiriman</p>
                  <p class="text-base font-bold text-gray-900">${departureTime.toLocaleString('id-ID', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                  })}</p>
                </div>

                <div class="bg-blue-50 rounded-lg p-4 border border-blue-200">
                  <p class="text-xs text-gray-600 uppercase font-semibold mb-3">Informasi Kurir</p>
                  <div class="space-y-2">
                    <div class="flex justify-between">
                      <span class="text-gray-700">Nama</span>
                      <span class="font-semibold text-gray-900">${delivery.driverName}</span>
                    </div>
                    <div class="flex justify-between">
                      <span class="text-gray-700">No. Telepon</span>
                      <span class="font-semibold text-gray-900">${driver?.phone || '-'}</span>
                    </div>
                    <div class="flex justify-between">
                      <span class="text-gray-700">Tipe Kendaraan</span>
                      <span class="font-semibold text-gray-900">${driver?.vehicleType || '-'}</span>
                    </div>
                    <div class="flex justify-between">
                      <span class="text-gray-700">Plat Nomor</span>
                      <span class="font-semibold text-gray-900">${driver?.licensePlate || '-'}</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Right: Items Being Delivered -->
            <div class="bg-white rounded-lg border border-gray-200 p-4 sm:p-6">
              <h2 class="text-lg sm:text-xl font-bold text-gray-900 mb-4">Tools yang Dikirim</h2>
              
              <div class="space-y-3 mb-6">
                ${itemsHtml || '<p class="text-gray-600">-</p>'}
              </div>

              <!-- Summary -->
              <div class="bg-blue-50 rounded-lg p-4 border-t-4 border-blue-600">
                <div class="flex justify-between items-center">
                  <span class="text-gray-700 font-semibold">Total Item Dikirim</span>
                  <span class="text-2xl font-bold text-blue-600">${delivery.rentals.reduce((sum, r) => sum + (r.items || 0), 0)} Unit</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Delivery Proof Section -->
          <div class="bg-white rounded-lg border border-gray-200 p-4 sm:p-6">
            <h2 class="text-lg sm:text-xl font-bold text-gray-900 mb-4">Bukti Pengiriman</h2>

            <!-- Photo Upload -->
            <div class="mb-6">
              <label class="block text-sm font-semibold text-gray-900 mb-3">Upload Foto Bukti Pengiriman *</label>
              <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-blue-500 transition">
                <input type="file" id="proofImage" accept="image/*" onchange="previewImage()" class="hidden" />
                <label for="proofImage" class="cursor-pointer">
                  <svg class="w-12 h-12 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                  </svg>
                  <p class="text-gray-600 font-semibold">Klik untuk upload atau drag & drop</p>
                  <p class="text-gray-500 text-sm">PNG, JPG, GIF (Max 5MB)</p>
                </label>
              </div>

              <!-- Image Preview -->
              <div id="imagePreview" class="mt-4"></div>
            </div>

            <!-- Notes -->
            <div class="mb-6">
              <label for="deliveryNotes" class="block text-sm font-semibold text-gray-900 mb-2">Catatan (Opsional)</label>
              <textarea id="deliveryNotes" placeholder="Tambahkan catatan tentang pengiriman..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 h-24 resize-none text-sm sm:text-base"></textarea>
            </div>

            <!-- Submit Button -->
            <button onclick="finishDelivery()" class="w-full bg-green-600 text-white py-3 sm:py-4 rounded-lg font-bold text-base sm:text-lg hover:bg-green-700 transition">
              ✓ Selesaikan Pengiriman
            </button>
          </div>
        </div>
      `;

      pageContent.innerHTML = html;
    }

    function previewImage() {
      const fileInput = document.getElementById('proofImage');
      const preview = document.getElementById('imagePreview');

      if (fileInput.files && fileInput.files[0]) {
        const file = fileInput.files[0];
        
        // Validate file size
        if (file.size > 5 * 1024 * 1024) {
          alert('File terlalu besar. Maksimal 5MB.');
          fileInput.value = '';
          return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
          deliveryProofImage = e.target.result;
          preview.innerHTML = `
            <div class="relative inline-block w-full">
              <img src="${e.target.result}" alt="Preview" class="image-preview w-full" />
              <button type="button" onclick="removeImage()" class="absolute top-2 right-2 bg-red-600 text-white rounded-full p-2 hover:bg-red-700 shadow-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            </div>
          `;
        };
        reader.readAsDataURL(file);
      }
    }

    function removeImage() {
      deliveryProofImage = null;
      document.getElementById('proofImage').value = '';
      document.getElementById('imagePreview').innerHTML = '';
    }

    function finishDelivery() {
      if (!deliveryProofImage) {
        alert('Mohon upload foto bukti pengiriman terlebih dahulu!');
        return;
      }

      const delivery = dummyData.shippings.find(d => d.id === currentDeliveryId);
      if (!delivery) return;

      const notes = document.getElementById('deliveryNotes').value;

      // Update delivery
      delivery.status = 'Delivered';
      delivery.proofImage = deliveryProofImage;
      delivery.notes = notes;
      delivery.arrivalTime = new Date().toISOString();

      // Reset and show success
      deliveryProofImage = null;
      currentDeliveryId = null;
      document.getElementById('successModal').classList.add('active');
    }

    function closeSuccessModal() {
      document.getElementById('successModal').classList.remove('active');
      renderDeliveryList();
    }
  </script>
</body>
</html>
